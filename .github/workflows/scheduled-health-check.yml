name: Scheduled Health Check
on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6am UTC
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Code QA Bot monitoring
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CODE_QA_BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Tenant-Id: ${{ secrets.CODE_QA_BOT_TENANT_ID }}" \
            -d '{}' \
            "${{ secrets.CODE_QA_BOT_URL }}/api/monitor/run"
